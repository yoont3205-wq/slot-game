<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랜덤번호 대포</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(#6c8ed4, #87ceeb);
    text-align:center;
}

#numberBall {
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    width:220px;
    height:220px;
    border-radius:50%;
    background:#00c400;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:90px;
    color:gold;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
}

#countText {
    position:absolute;
    top:42%;
    left:50%;
    transform:translateX(-50%);
    font-size:20px;
    color:black;
}

#cannon {
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:150px;
    height:220px;
    background:orange;
    border-radius:40px 40px 0 0;
    box-shadow: inset -10px 0 rgba(0,0,0,0.2);
}

#fireBtn {
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:80px;
    height:80px;
    background:gold;
    border-radius:50%;
    border:5px solid #333;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

#fireBtn:active {
    transform:translateX(-50%) scale(0.9);
}

#inputBox {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.95);
    padding:20px 30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

input {
    font-size:20px;
    padding:5px;
    width:80px;
}

button {
    font-size:18px;
    padding:8px 15px;
    margin-left:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="numberBall">?</div>
<div id="countText"></div>

<div id="inputBox">
    마지막 번호가 몇 번인가요?
    <br><br>
    <input type="number" id="maxNumber" min="1">
    번
    <button onclick="startGame()">확인</button>
</div>

<div id="cannon"></div>
<div id="fireBtn" onclick="fire()"></div>

<script>

let max = 0;
let count = 0;

function startGame() {
    max = parseInt(document.getElementById("maxNumber").value);
    if(!max || max < 1){
        alert("1 이상 입력하세요");
        return;
    }
    document.getElementById("inputBox").style.display="none";
    document.getElementById("countText").innerText="1 번째";
}

function fire(){
    if(max === 0) return;

    const ball = document.getElementById("numberBall");

    // 발사 애니메이션
    ball.style.transform="translateX(-50%) scale(1.2)";
    setTimeout(()=>{
        ball.style.transform="translateX(-50%) scale(1)";
    },200);

    let number = Math.floor(Math.random()*max)+1;
    ball.innerText = number;

    count++;
    document.getElementById("countText").innerText=count+" 번째";
}

</script>

</body>
</html>
