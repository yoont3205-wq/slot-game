<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랜덤번호 대포</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: 'Trebuchet MS', sans-serif;
}

/* 🌤 하늘 */
.sky {
    position:fixed;
    width:100%;
    height:100%;
    background: linear-gradient(#4e73df, #87ceeb);
    overflow:hidden;
}

/* ☁ 구름 */
.cloud {
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:0.8;
    animation: moveCloud 60s linear infinite;
}
.cloud:before, .cloud:after {
    content:'';
    position:absolute;
    background:white;
    width:60px;
    height:60px;
    border-radius:50%;
}
.cloud:before { top:-30px; left:20px; }
.cloud:after { top:-20px; left:60px; }

@keyframes moveCloud {
    from { left:-200px; }
    to { left:110%; }
}

/* 🌳 언덕 */
.hill1 {
    position:absolute;
    bottom:0;
    width:120%;
    height:250px;
    background:#1e8f3e;
    border-radius:50% 50% 0 0;
    left:-10%;
}
.hill2 {
    position:absolute;
    bottom:0;
    width:120%;
    height:200px;
    background:#32cd32;
    border-radius:50% 50% 0 0;
    left:-5%;
}

/* 🎯 숫자 공 */
#numberBall {
    position:absolute;
    top:12%;
    left:50%;
    transform:translateX(-50%);
    width:230px;
    height:230px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #00ff00, #008f00);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:95px;
    color:gold;
    font-weight:bold;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
}

/* 🎯 추첨 회차 */
#countText {
    position:absolute;
    top:40%;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    color:black;
    font-weight:bold;
}

/* 💥 대포 */
#cannon {
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:160px;
    height:230px;
    background:linear-gradient(orange, #cc7000);
    border-radius:50px 50px 0 0;
    box-shadow: inset -10px 0 rgba(0,0,0,0.3);
}

/* 🔘 발사 버튼 */
#fireBtn {
    position:absolute;
    bottom:45px;
    left:50%;
    transform:translateX(-50%);
    width:90px;
    height:90px;
    background:radial-gradient(circle, gold, orange);
    border-radius:50%;
    border:6px solid #333;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
    transition:0.1s;
}
#fireBtn:active {
    transform:translateX(-50%) scale(0.85);
}

/* 📝 입력창 */
#inputBox {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(255,255,255,0.95);
    padding:25px 35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    font-size:20px;
}

input {
    font-size:20px;
    padding:5px;
    width:90px;
    text-align:center;
}

button {
    font-size:18px;
    padding:8px 15px;
    margin-left:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sky">
    <div class="cloud" style="top:20%; width:120px; height:50px;"></div>
    <div class="cloud" style="top:35%; width:150px; height:60px; animation-duration:80s;"></div>

    <div id="numberBall">?</div>
    <div id="countText"></div>

    <div id="inputBox">
        마지막 번호가 몇 번인가요?
        <br><br>
        <input type="number" id="maxNumber" min="1">
        번
        <button onclick="startGame()">확인</button>
    </div>

    <div id="cannon"></div>
    <div id="fireBtn" onclick="fire()"></div>

    <div class="hill1"></div>
    <div class="hill2"></div>
</div>

<script>
let max = 0;
let count = 0;

function startGame() {
    max = parseInt(document.getElementById("maxNumber").value);
    if(!max || max < 1){
        alert("1 이상 입력하세요");
        return;
    }
    document.getElementById("inputBox").style.display="none";
    document.getElementById("countText").innerText="1 번째";
}

function fire(){
    if(max === 0) return;

    const ball = document.getElementById("numberBall");

    ball.style.transform="translateX(-50%) scale(1.2)";
    setTimeout(()=>{
        ball.style.transform="translateX(-50%) scale(1)";
    },200);

    let number = Math.floor(Math.random()*max)+1;
    ball.innerText = number;

    count++;
    document.getElementById("countText").innerText=count+" 번째";
}
</script>

</body>
</html>
