<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Slot Game</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}
.slot {
  font-size: 60px;
  margin: 20px;
}
button {
  padding: 15px 30px;
  font-size: 20px;
  background: gold;
  border: none;
  border-radius: 10px;
}
</style>
</head>
<body>

<h2>🎰 슬롯 게임</h2>

<div class="slot" id="reel">🍒 🍋 🍉</div>
<h3 id="result"></h3>

<button onclick="spin()">SPIN</button>

<script>
const symbols = ["🍒","🍋","🍉","⭐","💎","7️⃣"];

function spin() {
  let a = symbols[Math.floor(Math.random()*symbols.length)];
  let b = symbols[Math.floor(Math.random()*symbols.length)];
  let c = symbols[Math.floor(Math.random()*symbols.length)];

  document.getElementById("reel").innerText = `${a} ${b} ${c}`;

  if (a === b && b === c) {
    document.getElementById("result").innerText = "🎉 JACKPOT!";
  } else if (a === b || b === c || a === c) {
    document.getElementById("result").innerText = "✨ 2개 일치!";
  } else {
    document.getElementById("result").innerText = "❌ 꽝!";
  }
}
</script>

</body>
</html>
